apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: travel-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
      - name: analytics-service
        image: travel-ai/analytics-service:latest
        env:
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_PORT
          value: "8123"
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: KAFKA_BROKERS
        ports:
        - containerPort: 8010
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: travel-ai
spec:
  selector:
    app: analytics-service
  ports:
  - port: 8010
    targetPort: 8010
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: analytics-service-hpa
  namespace: travel-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: analytics-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
