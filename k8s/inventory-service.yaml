apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: travel-ai
spec:
  replicas: 5
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: travel-ai/inventory-service:latest
        env:
        - name: CASSANDRA_CONTACT_POINTS
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: CASSANDRA_CONTACT_POINTS
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: REDIS_PORT
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: KAFKA_BROKERS
        ports:
        - containerPort: 8003
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: travel-ai
spec:
  selector:
    app: inventory-service
  ports:
  - port: 8003
    targetPort: 8003
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inventory-service-hpa
  namespace: travel-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inventory-service
  minReplicas: 5
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
