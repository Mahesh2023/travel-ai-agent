apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cassandra-pvc
  namespace: travel-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: travel-ai
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
      - name: cassandra
        image: cassandra:4
        env:
        - name: CASSANDRA_CLUSTER_NAME
          value: "travel-cluster"
        - name: CASSANDRA_DC
          value: "DC1"
        - name: CASSANDRA_RACK
          value: "Rack1"
        - name: CASSANDRA_ENDPOINT_SNITCH
          value: GossipingPropertyFileSnitch
        ports:
        - containerPort: 9042
        volumeMounts:
        - name: cassandra-storage
          mountPath: /var/lib/cassandra
      volumes:
      - name: cassandra-storage
        persistentVolumeClaim:
          claimName: cassandra-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: travel-ai
spec:
  selector:
    app: cassandra
  ports:
  - port: 9042
    targetPort: 9042
