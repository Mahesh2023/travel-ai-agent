apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: travel-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-orchestrator
  template:
    metadata:
      labels:
        app: agent-orchestrator
    spec:
      containers:
      - name: agent-orchestrator
        image: travel-ai/agent-orchestrator:latest
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: travel-secrets
              key: OPENAI_API_KEY
        - name: MCP_GATEWAY_URL
          value: "http://mcp-service:8007"
        - name: RAG_SERVICE_URL
          value: "http://rag-service:8006"
        ports:
        - containerPort: 8009
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: travel-ai
spec:
  selector:
    app: agent-orchestrator
  ports:
  - port: 8009
    targetPort: 8009
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agent-orchestrator-hpa
  namespace: travel-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agent-orchestrator
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
