apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: travel-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: travel-ai/payment-service:latest
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: DATABASE_URL
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: travel-secrets
              key: STRIPE_API_KEY
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: KAFKA_BROKERS
        ports:
        - containerPort: 8004
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: travel-ai
spec:
  selector:
    app: payment-service
  ports:
  - port: 8004
    targetPort: 8004
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: travel-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
