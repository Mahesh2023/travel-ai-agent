apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: travel-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: travel-ai/gateway:latest
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: travel-config
              key: REDIS_PORT
        - name: SEARCH_SERVICE_URL
          value: "http://search-service:8001"
        - name: BOOKING_SERVICE_URL
          value: "http://booking-service:8002"
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service:8003"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8004"
        - name: USER_SERVICE_URL
          value: "http://user-service:8005"
        - name: RAG_SERVICE_URL
          value: "http://rag-service:8006"
        - name: MCP_SERVICE_URL
          value: "http://mcp-service:8007"
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: travel-ai
spec:
  selector:
    app: api-gateway
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: travel-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
