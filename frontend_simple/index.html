<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel AI Agent - Plan Your Trip with AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .chat-container {
            height: 400px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: #f9f9f9;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            max-width: 80%;
        }

        .message.user {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .message.assistant {
            background: #e0e0e0;
            color: #333;
        }

        .message.emergency {
            background: #ff4444;
            color: white;
            border: 2px solid #cc0000;
        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .chat-input button {
            background: #667eea;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #5568d3;
        }

        .result {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .followups {
            margin-top: 15px;
        }

        .followups button {
            background: #e0e0e0;
            color: #333;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            margin-right: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 14px;
        }

        .followups button:hover {
            background: #d0d0d0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .loading.active {
            display: block;
        }

        .emergency-alert {
            background: #ffebee;
            border: 2px solid #f44336;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            color: #c62828;
        }

        .emergency-alert h3 {
            margin-bottom: 10px;
        }

        .emergency-alert ul {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Travel AI Agent</h1>
            <p>Plan your perfect trip with AI-powered travel planning and counselling</p>
        </div>

        <div class="main-content">
            <!-- Travel Planning Form -->
            <div class="card">
                <h2>✈️ Plan Your Trip</h2>
                <form id="travelForm">
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" placeholder="e.g., Paris, Tokyo, New York" required>
                    </div>
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="form-group">
                        <label for="budget">Budget ($)</label>
                        <input type="number" id="budget" placeholder="e.g., 5000">
                    </div>
                    <div class="form-group">
                        <label for="travelers">Number of Travelers</label>
                        <input type="number" id="travelers" value="1" min="1" max="20">
                    </div>
                    <div class="form-group">
                        <label for="interests">Interests (comma-separated)</label>
                        <input type="text" id="interests" placeholder="e.g., food, history, adventure, culture">
                    </div>
                    <button type="submit" class="btn">Generate Travel Plan</button>
                </form>
                <div id="planResult" class="result" style="display: none;"></div>
                <div class="loading" id="planLoading">Generating your travel plan...</div>
            </div>

            <!-- Travel Counselling Chat -->
            <div class="card">
                <h2>💬 Travel Counsellor</h2>
                <p style="margin-bottom: 15px; color: #666;">Get personalized travel advice, address concerns, or just chat about your travel dreams.</p>
                <div class="chat-container" id="chatContainer"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Type your message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
                <div class="followups" id="followups"></div>
                <div class="loading" id="chatLoading">Thinking...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://travel-ai-backend.onrender.com';

        let conversation = [];

        // Travel Planning
        document.getElementById('travelForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const destination = document.getElementById('destination').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const budget = document.getElementById('budget').value;
            const travelers = document.getElementById('travelers').value;
            const interests = document.getElementById('interests').value;

            const loading = document.getElementById('planLoading');
            const result = document.getElementById('planResult');
            
            loading.classList.add('active');
            result.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/api/travel/plan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        destination,
                        start_date: startDate,
                        end_date: endDate,
                        budget: budget ? parseFloat(budget) : null,
                        travelers: parseInt(travelers),
                        interests: interests ? interests.split(',').map(i => i.trim()) : [],
                        preferences: {}
                    })
                });

                const data = await response.json();
                
                result.innerHTML = `
                    <h3>Travel Plan for ${destination}</h3>
                    <p><strong>Mode:</strong> ${data.mode}</p>
                    <p><strong>Budget:</strong> $${data.budget || 'Not specified'}</p>
                    <hr style="margin: 15px 0;">
                    <p>${data.itinerary}</p>
                `;
                result.style.display = 'block';
            } catch (error) {
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                result.style.display = 'block';
            } finally {
                loading.classList.remove('active');
            }
        });

        // Travel Counselling Chat
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;

            input.value = '';
            addMessage(message, 'user');

            const loading = document.getElementById('chatLoading');
            loading.classList.add('active');

            try {
                const response = await fetch(`${API_URL}/api/travel/counsel`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message,
                        conversation,
                        context: {}
                    })
                });

                const data = await response.json();
                
                conversation.push({ role: 'user', text: message });
                conversation.push({ role: 'assistant', text: data.response });

                // Handle emergency
                if (data.emergency_detected) {
                    showEmergency(data.emergency);
                }

                addMessage(data.response, 'assistant');
                showFollowups(data.followups);
            } catch (error) {
                addMessage(`Error: ${error.message}`, 'assistant');
            } finally {
                loading.classList.remove('active');
            }
        }

        function addMessage(text, role) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showEmergency(emergency) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'emergency-alert';
            div.innerHTML = `
                <h3>⚠️ Travel Emergency Detected</h3>
                <p>${emergency.message}</p>
                <ul>
                    ${emergency.resources.map(r => `<li>${r}</li>`).join('')}
                </ul>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showFollowups(followups) {
            const container = document.getElementById('followups');
            container.innerHTML = '';
            followups.forEach(followup => {
                const btn = document.createElement('button');
                btn.textContent = followup;
                btn.onclick = () => {
                    document.getElementById('chatInput').value = followup;
                    sendMessage();
                };
                container.appendChild(btn);
            });
        }

        // Enter key to send
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initial greeting
        addMessage("Hello! I'm your travel counsellor. How can I help you plan your trip or address any travel concerns?", 'assistant');
    </script>
</body>
</html>
