apiVersion: v1
kind: Secret
metadata:
  name: travel-agent-secrets
  namespace: travel-agent-simple
type: Opaque
stringData:
  llm-base-url: "https://api.openai.com/v1"
  llm-api-key: "your-openai-api-key-here"
  consent-secret: "your-consent-secret-here"
  redis-url: "redis://redis-service:6379"
  database-url: "postgresql://user:password@postgres-service:5432/travel_db"
