# Render Deployment Configuration
# Note: This is a simplified monolithic deployment suitable for Render.
# For the full microservices architecture (100M users scale), use Kubernetes with the k8s/ manifests.

services:
  - type: web
    name: travel-ai-backend
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_ENVIRONMENT
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_API_KEY
        sync: false

  - type: web
    name: travel-ai-frontend
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://travel-ai-backend.onrender.com

databases:
  - name: travel-db
    databaseName: travel_db
    user: travel
    plan: starter
