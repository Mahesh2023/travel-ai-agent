# Render Deployment Configuration - Scalable (1M+ Users)
# Requires external Redis and PostgreSQL services

services:
  - type: web
    name: travel-ai-agent
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      # LLM Configuration (OpenAI-compatible - works with Grok)
      - key: TRAVEL_LLM_BACKEND
        value: openai
      - key: TRAVEL_LLM_MODEL
        value: gpt-4o-mini
      - key: TRAVEL_LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: TRAVEL_LLM_API_KEY
        sync: false
      # JWT Secret for authentication
      - key: TRAVEL_CONSENT_SECRET
        sync: false
      # Redis Configuration (Required for scalable deployment)
      - key: REDIS_URL
        sync: false
      # PostgreSQL Configuration (Required for scalable deployment)
      - key: DATABASE_URL
        sync: false
      # Environment
      - key: TELOSCOPY_ENV
        value: production
