# Render Deployment Configuration - Simplified Travel AI Agent
# Following teloscopy pattern: Single service, no microservices

services:
  - type: web
    name: travel-ai-agent-simple
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements_simple.txt
    startCommand: uvicorn backend_simple.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: "8000"
      # LLM Configuration (OpenAI-compatible - works with Grok)
      - key: TRAVEL_LLM_BACKEND
        value: openai
      - key: TRAVEL_LLM_MODEL
        value: gpt-4o-mini
      - key: TRAVEL_LLM_BASE_URL
        value: https://api.openai.com/v1
      - key: TRAVEL_LLM_API_KEY
        sync: false
      # Alternative: Use Grok
      # - key: TRAVEL_LLM_BASE_URL
      #   value: https://api.x.ai/v1
      # - key: TRAVEL_LLM_MODEL
      #   value: grok-beta
