version: '3.8'

services:
  # API Gateway
  api-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - SEARCH_SERVICE_URL=http://search-service:8001
      - BOOKING_SERVICE_URL=http://booking-service:8002
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - PAYMENT_SERVICE_URL=http://payment-service:8004
      - USER_SERVICE_URL=http://user-service:8005
      - RAG_SERVICE_URL=http://rag-service:8006
      - REDIS_URL=redis://redis:6379
    depends_on:
      - search-service
      - booking-service
      - inventory-service
      - payment-service
      - user-service
      - rag-service
      - redis

  # Search Service
  search-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.search
    ports:
      - "8001:8001"
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis:6379
    depends_on:
      - elasticsearch
      - redis

  # Booking Service
  booking-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.booking
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://travel:travel123@postgres:5432/travel_db
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - INVENTORY_SERVICE_URL=http://inventory-service:8003
      - PAYMENT_SERVICE_URL=http://payment-service:8004
    depends_on:
      - postgres
      - redis
      - kafka
      - inventory-service
      - payment-service

  # Inventory Service
  inventory-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.inventory
    ports:
      - "8003:8003"
    environment:
      - CASSANDRA_CONTACT_POINTS=cassandra
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - cassandra
      - redis
      - kafka

  # Payment Service
  payment-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.payment
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://travel:travel123@postgres:5432/travel_db
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - postgres
      - kafka

  # User Service
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.user
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://travel:travel123@postgres:5432/travel_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis

  # RAG Service
  rag-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.rag
    ports:
      - "8006:8006"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - REDIS_URL=redis://redis:6379

  # MCP Gateway
  mcp-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    ports:
      - "8007:8007"
    environment:
      - AMADEUS_API_KEY=${AMADEUS_API_KEY}
      - AMADEUS_SECRET=${AMADEUS_SECRET}
      - BOOKING_API_KEY=${BOOKING_API_KEY}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - redis
      - kafka

  # Notification Service
  notification-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification
    ports:
      - "8008:8008"
    environment:
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - TWILIO_API_KEY=${TWILIO_API_KEY}
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - kafka

  # Databases
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=travel_db
      - POSTGRES_USER=travel
      - POSTGRES_PASSWORD=travel123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cassandra:
    image: cassandra:4
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra

  elasticsearch:
    image: elasticsearch:8
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Message Queue
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  cassandra_data:
  elasticsearch_data:
  redis_data:
